<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>TaskFlow Kanban</title>
    <meta
      name="description"
      content="Kanban board with drag-and-drop, editing, and LocalStorage persistence."
    />
    <meta name="theme-color" content="#F5F7FB" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="TaskFlow Kanban" />
    <meta
      property="og:description"
      content="Kanban board with drag-and-drop, editing, and LocalStorage persistence."
    />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="TaskFlow Kanban" />
    <meta
      name="twitter:description"
      content="Kanban board with drag-and-drop, editing, and LocalStorage persistence."
    />

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1'%3E%3Cstop stop-color='%236ee7ff'/%3E%3Cstop offset='1' stop-color='%23a78bfa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='%230b1220'/%3E%3Cpath d='M18 44V20h12c7.2 0 12 4.7 12 12s-4.8 12-12 12H18zm8-6h3.4c4.1 0 6.6-2.4 6.6-6s-2.5-6-6.6-6H26v12z' fill='url(%23g)'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <header class="top">
      <div class="container top__inner">
        <div>
          <a class="back" href="./README.md">README</a>
          <h1 class="title">TaskFlow Kanban</h1>
          <p class="subtitle">Drag & drop • Editing • LocalStorage</p>
        </div>
        <div class="actions">
          <button class="btn btn--ghost" type="button" data-export>
            Export JSON
          </button>
          <button class="btn btn--ghost" type="button" data-reset>
            Clear board
          </button>
          <button class="btn btn--primary" type="button" data-add-task>
            New task
          </button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="board" aria-label="Kanban board">
        <div class="col" data-col="backlog">
          <div class="col__header">
            <h2 class="col__title">Backlog</h2>
            <span class="col__count" data-count="backlog">0</span>
          </div>
          <div class="col__dropzone" data-dropzone="backlog" role="list"></div>
        </div>

        <div class="col" data-col="doing">
          <div class="col__header">
            <h2 class="col__title">In progress</h2>
            <span class="col__count" data-count="doing">0</span>
          </div>
          <div class="col__dropzone" data-dropzone="doing" role="list"></div>
        </div>

        <div class="col" data-col="done">
          <div class="col__header">
            <h2 class="col__title">Done</h2>
            <span class="col__count" data-count="done">0</span>
          </div>
          <div class="col__dropzone" data-dropzone="done" role="list"></div>
        </div>
      </section>
    </main>

    <dialog class="dialog" data-dialog>
      <form class="form" method="dialog" data-form>
        <header class="form__header">
          <h3 class="form__title" data-form-title>New task</h3>
          <button class="icon-btn" value="cancel" aria-label="Close" type="submit">
            ✕
          </button>
        </header>

        <label class="field">
          <span class="field__label">Title</span>
          <input class="field__input" name="title" required maxlength="70" />
        </label>

        <label class="field">
          <span class="field__label">Description</span>
          <textarea
            class="field__input field__input--textarea"
            name="description"
            rows="4"
            maxlength="240"
          ></textarea>
        </label>

        <div class="row">
          <label class="field">
            <span class="field__label">Status</span>
            <select class="field__input" name="status">
              <option value="backlog">Backlog</option>
              <option value="doing">In progress</option>
              <option value="done">Done</option>
            </select>
          </label>

          <label class="field">
            <span class="field__label">Priority</span>
            <select class="field__input" name="priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </label>
        </div>

        <div class="form__actions">
          <button class="btn btn--ghost" type="button" data-delete hidden>
            Delete
          </button>
          <div class="spacer"></div>
          <button class="btn btn--ghost" type="submit" value="cancel">
            Cancel
          </button>
          <button class="btn btn--primary" type="button" data-save>
            Save
          </button>
        </div>

        <input type="hidden" name="id" />
      </form>
    </dialog>

    <div class="toast" role="status" aria-live="polite" aria-atomic="true" hidden data-toast></div>
  </body>
</html>
